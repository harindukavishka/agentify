name: Bug Report
description: Report a bug in Agentify
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `npx @agentify/cli transform <url>`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Agentify Version
      placeholder: "0.1.0"

  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: "20.x"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15 / Ubuntu 24.04 / Windows 11"
